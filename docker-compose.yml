services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Source + manifests (entrypoint re-runs npm ci when lockfile changes).
      - ./apps/web/src:/app/apps/web/src
      - ./apps/web/public:/app/apps/web/public
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./apps/web/package.json:/app/apps/web/package.json:ro
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: development
      ORCHESTRATION_API_URL: http://api:4000
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    ports:
      - "4000:4000"
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./package.json:/app/package.json:ro
      - ./package-lock.json:/app/package-lock.json:ro
      - ./apps/api/package.json:/app/apps/api/package.json:ro
      - ./apps/web/.env:/app/apps/web/.env:ro
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: development
      PORT: 4000

  web-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production

  api-prod:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - apps/web/.env
    environment:
      NODE_ENV: production
      PORT: 4000
