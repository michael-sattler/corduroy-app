<style>
#erd svg.erDiagram .divider path { stroke-opacity: 0.5; }
#erd svg.erDiagram .row-rect-odd path,
#erd svg.erDiagram .row-rect-odd rect,
#erd svg.erDiagram .row-rect-even path,
#erd svg.erDiagram .row-rect-even rect { stroke: none !important; }
#erd { padding: 1rem 0; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  CLIENTS ||--o{ PLANS : has
  PLANS ||--o{ PLAN_GOALS : defines
  PLANS ||--o{ PLAN_KPIS : tracks
  PLANS ||--o{ PLAN_INITIATIVES : contains
  PLANS ||--o{ PLAN_MONTHS : spans
  PLANS ||--o{ PLAN_TASKS : contains
  PLANS ||--o{ PLAN_BUDGET_ALLOCATIONS : allocates
  PLANS ||--o{ PLAN_SUCCESS_CRITERIA : measures
  PLAN_MONTHS ||--o{ PLAN_WEEKS : contains
  PLAN_MONTHS ||--o| PLAN_CHECK_INS : concludes
  PLAN_TASKS }o--o{ PLAN_WEEKS : scheduled_via
  PLAN_TASKS ||--o{ TASK_WEEK_REFS : has
  PLAN_WEEKS ||--o{ TASK_WEEK_REFS : has
  PLAN_TASKS }o--|| PLAN_INITIATIVES : belongs_to
  PLAN_TASKS }o--o| PLAN_CHECK_INS : realizes
  PLAN_TASKS ||--o{ TASK_STATUS_HISTORY : logs
  PLAN_KPIS ||--o{ KPI_HISTORY : logs
  PLAN_KPIS ||--o{ KPI_GOAL_REFS : has
  PLAN_GOALS ||--o{ KPI_GOAL_REFS : has
  PLAN_INITIATIVES ||--o{ INITIATIVE_KPI_REFS : has
  PLAN_KPIS ||--o{ INITIATIVE_KPI_REFS : has
  PLAN_SUCCESS_CRITERIA }o--o| PLAN_KPIS : evaluates

  CLIENTS {
    uuid id PK
    string plan_client_id UK
    string external_client_id FK
    string name
    string owner_name
    string advisor_name
    string industry
  }
  PLANS {
    uuid id PK
    uuid client_id FK
    string plan_id UK
    string schema_version
    date period_start
    date period_end
    string status
    jsonb source_json
    timestamp generated_at
  }
  PLAN_GOALS {
    uuid id PK
    uuid plan_id FK
    string goal_id UK
    string label
    text description
    text target
    int priority
  }
  PLAN_KPIS {
    uuid id PK
    uuid plan_id FK
    string kpi_id UK
    string label
    string source
    numeric initial_value
    numeric current_value
    text target
    string frequency
  }
  KPI_HISTORY {
    uuid id PK
    uuid kpi_id FK
    numeric value
    timestamp recorded_at
    string change_source
    string recorded_by
  }
  KPI_GOAL_REFS {
    uuid kpi_id FK
    uuid goal_id FK
  }
  PLAN_INITIATIVES {
    uuid id PK
    uuid plan_id FK
    string initiative_id UK
    string label
    string owner
    text success_criteria
    numeric budget_usd
    string status
  }
  INITIATIVE_KPI_REFS {
    uuid initiative_id FK
    uuid kpi_id FK
  }
  PLAN_MONTHS {
    uuid id PK
    uuid plan_id FK
    string month_id UK
    string name
    date start_date
    date end_date
    text theme
  }
  PLAN_WEEKS {
    uuid id PK
    uuid month_id FK
    string week_id UK
    int week_number
    date start_date
    date end_date
  }
  PLAN_CHECK_INS {
    uuid id PK
    uuid month_id FK
    string check_in_id UK
    string type
    uuid scheduled_week_id FK
    jsonb agenda
    string status
    timestamp completed_at
  }
  PLAN_TASKS {
    uuid id PK
    uuid plan_id FK
    uuid initiative_id FK
    uuid check_in_id FK
    string task_id UK
    text label
    string category
    string owner
    string status
    string priority
    bool is_recurring
    bool is_meeting
    text deliverable
    timestamp completed_at
  }
  TASK_WEEK_REFS {
    uuid task_id FK
    uuid week_id FK
  }
  TASK_STATUS_HISTORY {
    uuid id PK
    uuid task_id FK
    string status_from
    string status_to
    string changed_by
    string change_source
    timestamp changed_at
  }
  PLAN_BUDGET_ALLOCATIONS {
    uuid id PK
    uuid plan_id FK
    string category
    numeric monthly_usd
    text note
  }
  PLAN_SUCCESS_CRITERIA {
    uuid id PK
    uuid plan_id FK
    uuid kpi_id FK
    text metric
    text target
  }`);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
