<svg viewBox="0 0 1180 920" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="aSolid" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1F3D73"/>
    </marker>
    <marker id="aDash" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#2E5AAC"/>
    </marker>
    <marker id="aDot" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1180" height="920" fill="#FFFFFF"/>
  <rect x="8" y="8" width="1164" height="904" rx="14" fill="none" stroke="#E2E8F2" stroke-width="1"/>

  <!-- Title -->
  <text x="40" y="46" font-size="26" font-weight="700" fill="#1A1A1A">Corduroy — Launch 1 Architecture</text>
  <text x="40" y="70" font-size="13" fill="#5A5A5A">Vercel · Railway · Supabase · AWS · Anthropic ZDR — Technical Design Document v0.4</text>

  <!-- ===== USERS ===== -->
  <g>
    <rect x="348" y="88" width="232" height="52" rx="9" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="464" y="112" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Client</text>
    <text x="464" y="129" font-size="10.5" fill="#5A5A5A" text-anchor="middle">business leader</text>

    <rect x="616" y="88" width="232" height="52" rx="9" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="732" y="112" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Corduroy Staff</text>
    <text x="732" y="129" font-size="10.5" fill="#5A5A5A" text-anchor="middle">advisor — SSO + MFA</text>
  </g>

  <!-- ===== PRESENTATION (Vercel) ===== -->
  <g>
    <rect x="300" y="160" width="600" height="108" rx="11" fill="#E7EDF7" stroke="#C9D2E0"/>
    <text x="316" y="181" font-size="12" font-weight="700" fill="#1F3D73">PRESENTATION · Vercel — one codebase, separate subdomains</text>
    <rect x="320" y="192" width="270" height="64" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="455" y="218" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Client App</text>
    <text x="455" y="236" font-size="10.5" fill="#5A5A5A" text-anchor="middle">app.corduroy.com</text>
    <rect x="610" y="192" width="270" height="64" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="745" y="218" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Admin Console</text>
    <text x="745" y="236" font-size="10.5" fill="#5A5A5A" text-anchor="middle">admin.corduroy.com</text>
  </g>

  <!-- ===== APPLICATION (Railway) ===== -->
  <g>
    <rect x="300" y="292" width="600" height="92" rx="11" fill="#F4F6FB" stroke="#C9D2E0"/>
    <text x="316" y="312" font-size="12" font-weight="700" fill="#1F3D73">APPLICATION · Railway</text>
    <rect x="320" y="320" width="560" height="52" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="600" y="343" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Orchestration API</text>
    <text x="600" y="360" font-size="10.5" fill="#5A5A5A" text-anchor="middle">authorization · plan orchestration · audit writes · serves both surfaces</text>
  </g>

  <!-- ===== SUPABASE (left column) ===== -->
  <g>
    <rect x="120" y="410" width="410" height="250" rx="11" fill="#E9F3EA" stroke="#C9D2E0"/>
    <text x="136" y="431" font-size="12" font-weight="700" fill="#1F5A2E">IDENTITY &amp; RELATIONAL DATA · Supabase — one project</text>
    <rect x="138" y="442" width="374" height="64" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="325" y="468" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Auth</text>
    <text x="325" y="486" font-size="10.5" fill="#5A5A5A" text-anchor="middle">one pool · role-based · staff SSO + MFA (email-domain routing)</text>
    <rect x="138" y="518" width="374" height="128" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="325" y="542" font-size="14" font-weight="700" fill="#1A1A1A" text-anchor="middle">Postgres + RLS</text>
    <text x="325" y="565" font-size="10.5" fill="#5A5A5A" text-anchor="middle">plans · milestones · tasks</text>
    <text x="325" y="582" font-size="10.5" fill="#5A5A5A" text-anchor="middle">vault_objects (catalog) · audit_events</text>
    <text x="325" y="599" font-size="10.5" fill="#5A5A5A" text-anchor="middle">plan_edits · client/staff/assignments</text>
    <text x="325" y="623" font-size="10.5" font-style="italic" fill="#8A6D1F" text-anchor="middle">dashboard_widgets (jsonb) — Launch 2</text>
  </g>

  <!-- ===== AWS (right column) ===== -->
  <g>
    <rect x="600" y="410" width="482" height="300" rx="11" fill="#FBF1DE" stroke="#C9D2E0"/>
    <text x="616" y="431" font-size="12" font-weight="700" fill="#8A6D1F">DATA PLANE (THE VAULT) · AWS</text>
    <!-- VPC boundary -->
    <rect x="614" y="440" width="454" height="212" rx="9" fill="none" stroke="#1F3D73" stroke-width="1.2" stroke-dasharray="5 4"/>
    <text x="628" y="456" font-size="10.5" font-style="italic" fill="#1F3D73">VPC · endpoints to S3 + KMS</text>

    <rect x="628" y="464" width="204" height="78" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="730" y="488" font-size="13.5" font-weight="700" fill="#1A1A1A" text-anchor="middle">AccessBroker λ</text>
    <text x="730" y="506" font-size="10.5" fill="#5A5A5A" text-anchor="middle">validate · sign · log</text>
    <text x="730" y="522" font-size="10.5" fill="#5A5A5A" text-anchor="middle">mints pre-signed URLs</text>

    <rect x="850" y="464" width="200" height="78" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="950" y="486" font-size="13.5" font-weight="700" fill="#1A1A1A" text-anchor="middle">ContentDispatcher λ</text>
    <text x="950" y="503" font-size="10.5" fill="#5A5A5A" text-anchor="middle">router · rules from API</text>
    <text x="950" y="518" font-size="10.5" fill="#5A5A5A" text-anchor="middle">extract · route data</text>
    <text x="950" y="533" font-size="10.5" fill="#5A5A5A" text-anchor="middle">write derived/ · catalog</text>

    <rect x="628" y="562" width="268" height="82" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="762" y="586" font-size="13.5" font-weight="700" fill="#1A1A1A" text-anchor="middle">S3 — per-client buckets</text>
    <text x="762" y="604" font-size="10.5" fill="#5A5A5A" text-anchor="middle">SSE-KMS · raw/ derived/ context/ audit/</text>
    <text x="762" y="620" font-size="10.5" fill="#5A5A5A" text-anchor="middle">append-only dated objects</text>
    <text x="762" y="636" font-size="10" font-style="italic" fill="#8A6D1F" text-anchor="middle">no Object Lock / no versioning (by choice)</text>

    <rect x="914" y="562" width="136" height="82" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="982" y="592" font-size="13.5" font-weight="700" fill="#1A1A1A" text-anchor="middle">KMS</text>
    <text x="982" y="610" font-size="10.5" fill="#5A5A5A" text-anchor="middle">per-client keys</text>
    <text x="982" y="626" font-size="10" font-style="italic" fill="#8A6D1F" text-anchor="middle">never-delete</text>
  </g>

  <!-- ===== ANTHROPIC ===== -->
  <g>
    <rect x="600" y="730" width="482" height="74" rx="11" fill="#ECE9F3" stroke="#C9D2E0"/>
    <text x="616" y="751" font-size="12" font-weight="700" fill="#4A3B6B">LLM</text>
    <rect x="700" y="752" width="362" height="44" rx="8" fill="#FFFFFF" stroke="#C9D2E0"/>
    <text x="881" y="772" font-size="13.5" font-weight="700" fill="#1A1A1A" text-anchor="middle">Anthropic API — Sonnet</text>
    <text x="881" y="788" font-size="10.5" fill="#5A5A5A" text-anchor="middle">zero-data-retention tier</text>
  </g>

  <!-- ===== ARROWS: solid control/request ===== -->
  <g stroke="#1F3D73" stroke-width="1.6" fill="none" marker-end="url(#aSolid)">
    <path d="M460,140 L460,192"/>
    <path d="M732,140 L745,192"/>
    <path d="M455,256 L450,320"/>
    <path d="M745,256 L720,320"/>
    <path d="M380,372 L322,442"/>
    <path d="M740,372 L718,464"/>
    <path d="M812,372 L944,464"/>
    <path d="M985,464 L905,374"/>
  </g>

  <!-- broker/CP -> postgres (structured + audit) -->
  <g stroke="#1F3D73" stroke-width="1.4" fill="none" marker-end="url(#aSolid)">
    <path d="M628,506 L516,548"/>
    <path d="M850,540 L850,551 L600,551 L516,566"/>
  </g>

  <!-- broker -> S3 (scoped access) ; CP -> S3 (write derived) -->
  <g stroke="#1F3D73" stroke-width="1.4" fill="none" marker-end="url(#aSolid)">
    <path d="M712,542 L726,562"/>
    <path d="M935,542 L895,562"/>
  </g>

  <!-- CP -> Anthropic (ZDR), routed along right edge -->
  <g stroke="#1F3D73" stroke-width="1.6" fill="none" marker-end="url(#aSolid)">
    <path d="M1050,520 L1062,520 L1062,724 L1000,752"/>
  </g>

  <!-- ===== ARROW: dotted S3 event ===== -->
  <g stroke="#5A5A5A" stroke-width="1.5" fill="none" stroke-dasharray="2 4" marker-end="url(#aDot)">
    <path d="M800,562 L850,542"/>
  </g>

  <!-- ===== ARROW: dashed file bytes (browser <-> S3 direct) ===== -->
  <g stroke="#2E5AAC" stroke-width="2.4" fill="none" stroke-dasharray="8 5" marker-end="url(#aDash)">
    <path d="M900,210 L1120,210 L1120,602 L898,602"/>
  </g>

  <!-- ===== ARROW LABELS ===== -->
  <g font-size="10" fill="#3A4A66">
    <text x="318" y="408" text-anchor="middle">verify token · RLS</text>
    <text x="690" y="430">invoke: mint URL</text>
    <text x="905" y="430" text-anchor="end">invoke: generate</text>
    <text x="900" y="410" text-anchor="end">extracted data</text>
    <text x="556" y="512">audit</text>
    <text x="560" y="544">catalog update</text>
    <text x="690" y="556">scoped key</text>
    <text x="905" y="556">write derived/</text>
    <text x="806" y="540">ObjectCreated</text>
    <text x="1058" y="650" text-anchor="end">context (ZDR)</text>
  </g>
  <text x="908" y="200" font-size="10.5" font-weight="600" fill="#2E5AAC">file bytes — browser ⇄ S3, direct via pre-signed URL</text>

  <!-- ===== LEGEND / KEY PROPERTIES ===== -->
  <g>
    <rect x="120" y="824" width="962" height="80" rx="9" fill="#FBFCFE" stroke="#C9D2E0"/>
    <line x1="140" y1="846" x2="182" y2="846" stroke="#1F3D73" stroke-width="1.6" marker-end="url(#aSolid)"/>
    <text x="190" y="850" font-size="11" fill="#3A4A66">request / control path</text>
    <line x1="372" y1="846" x2="414" y2="846" stroke="#2E5AAC" stroke-width="2.4" stroke-dasharray="8 5" marker-end="url(#aDash)"/>
    <text x="422" y="850" font-size="11" fill="#3A4A66">file bytes — direct, pre-signed URL</text>
    <line x1="700" y1="846" x2="742" y2="846" stroke="#5A5A5A" stroke-width="1.5" stroke-dasharray="2 4" marker-end="url(#aDot)"/>
    <text x="750" y="850" font-size="11" fill="#3A4A66">S3 ObjectCreated event</text>
    <text x="140" y="876" font-size="11" fill="#3A4A66">AccessBroker holds the only S3 access; Railway can merely invoke it. Uploaded/downloaded file bytes move browser ⇄ S3 directly, never through Railway or the Lambdas.</text>
    <text x="140" y="894" font-size="11" fill="#3A4A66">Raw originals stay locked at rest in S3; authorized data in use flows where the work requires (API, LLM, downloads). Dashboards render from Postgres; documents fetch via AccessBroker.</text>
  </g>
</svg>
